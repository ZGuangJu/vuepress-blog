<head>

    <title>Document</title>
    <style>
        .box {
            width: 100%;
            height: 200px;
            background: pink;
        }

        .boxitem {
            width: 30%;
            height: 200px;
            background: yellowgreen;
        }

        @media screen and (max-width: 320px) {
            .boxitem {
                width: 30%;
                height: 100%;
                background: red;
            }
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="boxitem">1</div>
    </div>
    <script>
        var renderer = [1, 2, 3, 4, 5, 6];
        console.log(renderer[1]);
        renderer[1] = 'name';
        // renderer['1'] != renderer[1]
        console.log(renderer['1']);
    </script>

</body>
