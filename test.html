<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!-- <meta http-equiv="refresh" content="5"> -->
    <title>Document</title>
    <style>
        .box {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: space-between;
            height: 300px;
            background: sandybrown;
        }

        .boxitem {
            width: 200px;
            height: 200px;
            border: 1px solid #000;
            background: pink;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="boxitem">1</div>
        <div class="boxitem">2</div>
        <div class="boxitem">3</div>
        <div class="boxitem">4</div>
        <div class="boxitem">5</div>
        <div class="boxitem">6</div>
        <div class="boxitem">7</div>
        <div class="boxitem">8</div>
        <div class="boxitem">9</div>
        <div class="boxitem">10</div>
    </div>
    <script>
        console.log(eval([1, 2, 3, 4])); // expected output: 4

        console.log(eval(new String('2 + 2')));// 2 + 2

        console.log(eval('2 + 2') === eval('4'));//  true

    </script>

</body>

</html>
