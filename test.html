<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <!-- <meta http-equiv="refresh" content="5"> -->
        <title>Document</title>
        <style>
            span {
                display: block;
                border: 1px solid rebeccapurple;
                outline: salmon;
            }
            button {
                outline: solid 5px red;
            }
            button:hover {
                outline: solid 5px greenyellow;
            }
            button:active {
                outline: solid 5px blue;
            }
            a:link {
                color: slategray;
            }
            p {
                /* display: inline; */
                border: 1px solid rebeccapurple;
            }
            .exciting-text::before {
                content: "<- 让人兴兴兴奋!";
                color: green;
            }
            .boring-text::after {
                content: "<- 无聊!";
                color: red;
            }
        </style>
    </head>

    <body>
        <p class="boring-text">这是些无聊的文字</p>
        <p>这是不无聊也不有趣的文字</p>
        <p class="exciting-text">
            在MDN上做贡献简单又轻松。 按右上角的编辑按钮添加新示例或改进旧示例！
        </p>
        <script>
            var x = new String("Hello world");
            // 以上是实例化为字符串对象了
            console.log(x); //String {"Hello world"}0: "H"1: "e"2: "l"3: "l"4: "o"5: " "6: "w"7: "o"8: "r"9: "l"10: "d"length: 11__proto__: String[[PrimitiveValue]]: "Hello world"
            console.log(x.toString()); // test.html:53 Hello world
        </script>
    </body>
</html>
