<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <!-- <meta http-equiv="refresh" content="5"> -->
        <title>Document</title>
        <style>
            span {
                display: block;
                border: 1px solid rebeccapurple;
                outline: salmon;
            }
            button {
                outline: solid 5px red;
            }
            button:hover {
                outline: solid 5px greenyellow;
            }
            button:active {
                outline: solid 5px blue;
            }
            a:link {
                color: slategray;
            }
            p {
                /* display: inline; */
                border: 1px solid rebeccapurple;
            }
            .exciting-text::before {
                content: "<- 让人兴兴兴奋!";
                color: green;
            }
            .boring-text::after {
                content: "<- 无聊!";
                color: red;
            }
        </style>
    </head>

    <body>
        <img src="" alt="" />
        <p class="boring-text">这是些无聊的文字</p>
        <p>这是不无聊也不有趣的文字</p>
        <p class="exciting-text">
            在MDN上做贡献简单又轻松。 按右上角的编辑按钮添加新示例或改进旧示例！
        </p>
        <script>
            window.name = "byteDance";
            function A() {
                this.name = 123;
            }

            A.prototype.getA = function() {
                console.log(this);
                return this.name + 1;
            };
            let a = () => {};
            let a = new A();
            let funcA = a.getA;
            console.log(123);
            funcA();
        </script>
    </body>
</html>
