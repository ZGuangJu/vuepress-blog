            var a = Object(null);

            var items = ["Edward", "Sharpe", "And", "The", "Magnetic", "Zeros"];
            var d = items.sort(function(a, b) {
                var nameA = a.toUpperCase();
                var nameB = b.toUpperCase();
                if (nameA < nameB) {
                    return -1;
                }
                if (nameA > nameB) {
