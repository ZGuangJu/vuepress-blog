<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            div,
            body,
            p,
            h1,
            h2,
            h3,
            h4,
            h5,
            h6,
            form,
            li,
            ul,
            ol,
            dl,
            th,
            tr,
            td,
            hr,
            table,
            img,
            input,
            button {
                margin: 0;
                padding: 0;
            }
            .box {
                background: deepskyblue;
                /* height: 200px; */
                /* overflow: hidden; */
            }
            .box1 {
                width: 300px;
                height: 300px;
                background: darkslateblue;
                border: 1px solid black;
                float: left;
            }
            .box2 {
                opacity: 0.5;
                background: indianred;
                height: 200px;
                width: 200px;
                /* clear: both; */
                /* float: left; */
            }
            .box3 {
                background: seagreen;
                height: 100px;
                width: 100px;
                float: left;
            }
            input {
                background: none;
                outline: none;
                border: 0px;
            }
        </style>
    </head>

    <body>
        <div class="box">
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box3"></div>
        </div>
        <input type="text" />
    </body>
</html>
