<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            ul :nth-child(even) {
                color: red;
            }
            .box {
                width: 100%;
                height: 1px;
                background-image: linear-gradient(
                    to right,
                    #ccc 0%,
                    #ccc 50%,
                    transparent 50%
                );
                background-size: 8px 1px;
                background-repeat: repeat-x;
            }
            .box1 {
                width: 100%;
                height: 1px;
                border-top-style: dashed;
                border-top-width: 1px;
            }
        </style>
    </head>

    <body>
        <div class="box"></div>
        <br />
        <div class="box1"></div>
        <ul>
            <li>1</li>
            <li>2</li>
            <li>3</li>
            <li>4</li>
            <li>5</li>
            <li>6</li>
            <li>7</li>
            <li>8</li>
            <li>9</li>
            <li>10</li>
        </ul>
        <script>
            // 获取当前时间，可以存入数据库
            var timer = parseInt(new Date().getTime() / 1000);
            console.log(timer);
            // 将数据库中的时间戳，转换为日期时间格式
            function getTime(nS) {
                var date = new Date(parseInt(nS) * 1000);
                var year = date.getFullYear();
                var mon =
                    date.getMonth() + 1 < 10
                        ? "0" + (date.getMonth() + 1)
                        : date.getMonth() + 1;
                // 将月份个位加 0
                var day = date.getDate();
                var hours = date.getHours();
                var minu = date.getMinutes();
                var sec =
                    date.getSeconds().toString().length < 2
                        ? "0" + date.getSeconds()
                        : date.getSeconds();
                // 秒数 个位加 0

                return (
                    year +
                    "/" +
                    mon +
                    "/" +
                    day +
                    " " +
                    hours +
                    ":" +
                    minu +
                    ":" +
                    sec
                );
            }
            console.log(getTime(timer));
            function timestampToTime(timestamp) {
                var date = new Date(timestamp * 1000); //时间戳为10位需*1000，时间戳为13位的话不需乘1000
                var Y = date.getFullYear() + "-";
                var M =
                    (date.getMonth() + 1 < 10
                        ? "0" + (date.getMonth() + 1)
                        : date.getMonth() + 1) + "-";
                var D = date.getDate() + " ";
                var h = date.getHours() + ":";
                var m = date.getMinutes() + ":";
                var s =
                    date.getSeconds().toString().length < 2
                        ? "0" + date.getSeconds()
                        : date.getSeconds();
                console.log(s);
                return Y + M + D + h + m + s;
            }
            console.log(timestampToTime(timer));
        </script>
    </body>
</html>
