<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <script
            src="Vue2.6.12.js"
            type="text/javascript"
            charset="utf-8"
        ></script>
    </head>
    <body>
        <div id="app">
            {{message}}
            <button @click="ABC()">设置</button>
            <button @click="abc()">获取</button>
        </div>
        <script>
            var app = new Vue({
                el: "#app",
                data: {
                    message: "hello",
                },
                methods: {
                    ABC() {
                        document.cookie = "name=赵子龙";

                        localStorage.setItem("abc", "localStorage");
                        sessionStorage.setItem("abc", "sessionStorage");
                    },

                    abc() {
                        console.log(localStorage.getItem("abc"));
                        console.log(sessionStorage.getItem("abc"));
                        console.log(document.cookie);
                    },
                },
            });
        </script>
    </body>
</html>
